<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greeting Card</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: #f6f2ea;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      color: #7a4f18;
    }

    .language {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .language label {
      margin: 0 10px;
      cursor: pointer;
    }

    input[type="text"] {
      width: 90%;
      max-width: 420px;
      padding: 14px;
      font-size: 22px;
      border: 1px solid #ccc;
      border-radius: 10px;
      text-align: center;
      margin: 15px 0;
    }

    button {
      background: #7a4f18;
      color: white;
      border: none;
      padding: 14px 35px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    .preview {
      margin-top: 25px;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="language">
      <label>
        <input type="radio" name="lang" value="ar" checked onchange="changeLang()">
        العربية
      </label>

      <label>
        <input type="radio" name="lang" value="en" onchange="changeLang()">
        English
      </label>
    </div>

    <h1 id="title">بطاقة المعايدة</h1>
    <p id="desc">اكتب اسمك ثم اضغط على زر تحميل البطاقة.</p>

    <input type="text" id="empName" placeholder="اكتب الاسم هنا" />

    <br />

    <button id="downloadBtn" onclick="downloadCard()">تحميل البطاقة</button>

    <div class="preview">
      <p id="previewText">معاينة البطاقة:</p>
      <img src="card.jpg" alt="Greeting Card" />
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    function getSelectedLang() {
      return document.querySelector('input[name="lang"]:checked').value;
    }

    function changeLang() {
      const lang = getSelectedLang();

      if (lang === "ar") {
        document.documentElement.lang = "ar";
        document.documentElement.dir = "rtl";

        document.getElementById("title").innerText = "بطاقة المعايدة";
        document.getElementById("desc").innerText = "اكتب اسمك ثم اضغط على زر تحميل البطاقة.";
        document.getElementById("empName").placeholder = "اكتب الاسم هنا";
        document.getElementById("downloadBtn").innerText = "تحميل البطاقة";
        document.getElementById("previewText").innerText = "معاينة البطاقة:";
      } else {
        document.documentElement.lang = "en";
        document.documentElement.dir = "ltr";

        document.getElementById("title").innerText = "Greeting Card";
        document.getElementById("desc").innerText = "Enter your name, then click download.";
        document.getElementById("empName").placeholder = "Enter your name here";
        document.getElementById("downloadBtn").innerText = "Download Card";
        document.getElementById("previewText").innerText = "Card Preview:";
      }
    }

    function downloadCard() {
      const name = document.getElementById("empName").value.trim();
      const lang = getSelectedLang();

      if (!name) {
        alert(lang === "ar" ? "يرجى كتابة الاسم أولاً" : "Please enter your name first");
        return;
      }

      const img = new Image();
      img.src = "card.jpg";

      img.onload = function () {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        ctx.font = "bold 62px Arial";
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.direction = lang === "ar" ? "rtl" : "ltr";

        const textX = canvas.width / 2;
        const textY = canvas.height - 120;

        ctx.fillText(name, textX, textY);

        const link = document.createElement("a");
        link.download = "Greeting-Card-" + name + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      img.onerror = function () {
        alert("Image not found: card.jpg");
      };
    }
  </script>
</body>
</html>
