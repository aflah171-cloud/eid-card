<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eid Al-Adha Greeting Card</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: linear-gradient(135deg, #f7f3eb, #fffdf9);
      text-align: center;
      color: #2d2218;
    }

    .container {
      max-width: 950px;
      margin: 35px auto;
      background: #ffffff;
      padding: 35px;
      border-radius: 22px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10);
      border: 1px solid #ead8bd;
    }

    .language {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .language label {
      margin: 0 12px;
      cursor: pointer;
    }

    .icon {
      font-size: 46px;
      color: #9a681f;
      margin-bottom: 8px;
    }

    h1 {
      color: #7a4f18;
      font-size: 42px;
      margin: 10px 0 5px;
    }

    .subtitle {
      color: #b3833d;
      font-size: 28px;
      margin-bottom: 10px;
      font-style: italic;
    }

    p {
      color: #4d4033;
      font-size: 18px;
    }

    input[type="text"] {
      width: 90%;
      max-width: 500px;
      padding: 15px;
      font-size: 24px;
      border: 1px solid #d9d1c7;
      border-radius: 12px;
      text-align: center;
      margin: 15px 0;
    }

    button {
      background: linear-gradient(135deg, #8a5a18, #6f430e);
      color: white;
      border: none;
      padding: 15px 45px;
      font-size: 22px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(111, 67, 14, 0.25);
    }

    button:hover {
      background: linear-gradient(135deg, #6f430e, #573307);
    }

    #counterText {
      margin-top: 20px;
      font-weight: bold;
      color: #7a4f18;
      font-size: 20px;
    }

    .divider {
      margin: 30px auto 15px;
      width: 80%;
      border-top: 1px solid #ead8bd;
    }

    .preview img {
      max-width: 100%;
      border-radius: 14px;
      border: 1px solid #ddd;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="language">
      <label>
        <input type="radio" name="lang" value="ar" checked onchange="changeLang()">
        العربية
      </label>

      <label>
        <input type="radio" name="lang" value="en" onchange="changeLang()">
        English
      </label>
    </div>

    <div class="icon">☾ </div>

    <h1 id="title">بطاقة تهنئة عيد الأضحى</h1>

    <div class="subtitle" id="subtitle">
      Eid Al-Adha Mubarak
    </div>

    <p id="desc">
      اكتب اسمك ثم اضغط على زر تحميل البطاقة
    </p>

    <input type="text" id="empName" placeholder="اكتب الاسم هنا">

    <br>

    <button id="downloadBtn" onclick="downloadCard()">
      تحميل البطاقة
    </button>

    <p id="counterText">
      عدد البطاقات التي تم إنشاؤها: 0
    </p>

    <div class="divider"></div>

    <div class="preview">
      <p id="previewText">معاينة البطاقة:</p>

      <img src="card.jpg" alt="Eid Card">
    </div>

  </div>

  <canvas id="canvas"></canvas>

  <script>

  const GOOGLE_SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbz7ZFR2fb1OjVB_L9EPsJq50NjODMqP4UfMFf0J3QTHOhiv43wov7bHwXfCcmAs0URsvw/exec";
    function getSelectedLang() {
      return document.querySelector('input[name="lang"]:checked').value;
    }

    async function updateCounter() {

      try {

        const response = await fetch(GOOGLE_SCRIPT_URL);
        const data = await response.json();

        const lang = getSelectedLang();

        document.getElementById("counterText").innerText =
          lang === "ar"
            ? "عدد البطاقات التي تم إنشاؤها: " + data.count
            : "Cards generated: " + data.count;

      } catch (err) {

        console.log(err);

      }

    }

    function changeLang() {

      const lang = getSelectedLang();

      if (lang === "ar") {

        document.documentElement.lang = "ar";
        document.documentElement.dir = "rtl";

        document.getElementById("title").innerText =
          "بطاقة تهنئة عيد الأضحى";

        document.getElementById("subtitle").innerText =
          "عيد أضحى مبارك";

        document.getElementById("desc").innerText =
          "اكتب اسمك ثم اضغط على زر تحميل البطاقة";

        document.getElementById("empName").placeholder =
          "اكتب الاسم هنا";

        document.getElementById("downloadBtn").innerText =
          "تحميل البطاقة";

        document.getElementById("previewText").innerText =
          "معاينة البطاقة:";

      } else {

        document.documentElement.lang = "en";
        document.documentElement.dir = "ltr";

        document.getElementById("title").innerText =
          "Eid Al-Adha Greeting Card";

        document.getElementById("subtitle").innerText =
          "Eid Al-Adha Mubarak";

        document.getElementById("desc").innerText =
          "Enter your name then click download";

        document.getElementById("empName").placeholder =
          "Enter your name here";

        document.getElementById("downloadBtn").innerText =
          "Download Card";

        document.getElementById("previewText").innerText =
          "Card Preview:";

      }

      updateCounter();

    }

    async function downloadCard() {

      const name = document.getElementById("empName").value.trim();
      const lang = getSelectedLang();

      if (!name) {

        alert(
          lang === "ar"
            ? "يرجى كتابة الاسم أولاً"
            : "Please enter your name first"
        );

        return;

      }

      const img = new Image();

      img.src = "card.jpg";

      img.onload = async function () {

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        ctx.font = "bold 62px Arial";
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.direction =
          lang === "ar" ? "rtl" : "ltr";

        const textX = canvas.width / 2;
        const textY = canvas.height - 120;

        ctx.fillText(name, textX, textY);

        await fetch(GOOGLE_SCRIPT_URL, {

          method: "POST",

          body: JSON.stringify({
            name: name,
            language: lang
          })

        });

        updateCounter();

        const link = document.createElement("a");

        link.download =
          "Eid-Al-Adha-Card-" + name + ".png";

        link.href =
          canvas.toDataURL("image/png");

        link.click();

      };

      img.onerror = function () {

        alert("Image not found: card.jpg");

      };

    }

    window.onload = function () {

      updateCounter();

    };

  </script>

</body>

</html>
